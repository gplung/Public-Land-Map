<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Public Land Map</title>
<!-- Browser tab icon -->
<link rel="icon" type="image/png" href="Public_Lands_Map-icon.png">
<!-- iPhone home screen icon -->
<link rel="apple-touch-icon" href="Public_Lands_Map-icon.png">
<!-- iPad home screen icon -->
<link rel="apple-touch-icon" sizes="152x152" href="Public_Lands_Map-icon.png">
<!-- iPhone retina -->
<link rel="apple-touch-icon" sizes="180x180" href="Public_Lands_Map-icon.png">
<!-- App title when saved to home screen -->
<meta name="apple-mobile-web-app-title" content="Public Lands Map">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap');
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f0a500;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  #header{background:var(--panel);border-bottom:2px solid var(--accent);padding:8px 12px;display:flex;align-items:center;gap:8px;z-index:1000;flex-shrink:0;flex-wrap:wrap;}
  #header h1{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:0.06em;color:var(--accent);text-transform:uppercase;white-space:nowrap;}
  #header h1 span{color:var(--text);}
  .build-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;margin-right:4px;}
  #controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;}
  .btn{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:5px 11px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:background 0.15s;white-space:nowrap;}
  .btn:hover{background:#21262d;border-color:var(--accent);}
  .btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .btn.locate{background:#1d4ed8;color:#fff;border-color:#1d4ed8;}
  .btn.locate:hover{background:#1e40af;}
  #opacity-wrap{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.05em;text-transform:uppercase;}
  input[type=range]{width:70px;accent-color:var(--accent);cursor:pointer;}
  #map{flex:1;width:100%;}
  #loadbar{position:absolute;top:0;left:0;width:0%;height:3px;background:var(--accent);z-index:2000;transition:width 0.4s;}
  #statusbar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(13,17,23,0.88);border:1px solid var(--border);border-radius:12px;padding:4px 14px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);pointer-events:none;white-space:nowrap;}
  #statusbar b{color:var(--accent);}
  #legend{position:absolute;bottom:40px;right:8px;z-index:999;background:rgba(13,17,23,0.95);border:1px solid var(--border);border-radius:6px;padding:9px 11px;min-width:205px;backdrop-filter:blur(8px);}
  #legend-toggle{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
  #legend-body{margin-top:7px;display:flex;flex-direction:column;gap:4px;}
  .legend-row{display:flex;align-items:center;gap:7px;font-size:0.76rem;color:var(--text);}
  .legend-swatch{width:20px;height:14px;border-radius:2px;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);}
  #info-panel{position:absolute;bottom:40px;left:8px;z-index:999;background:rgba(13,17,23,0.96);border:2px solid var(--accent);border-radius:6px;padding:11px 13px;max-width:260px;display:none;backdrop-filter:blur(8px);}
  #info-panel h3{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;padding-right:16px;}
  #info-panel p{font-size:0.79rem;color:var(--text);line-height:1.6;}
  #info-close{position:absolute;top:7px;right:9px;cursor:pointer;color:var(--muted);font-size:0.95rem;}
  .leaflet-control-attribution{background:rgba(13,17,23,0.7)!important;color:var(--muted)!important;font-size:0.6rem!important;}
  .leaflet-control-attribution a{color:var(--muted)!important;}
  #manage-btn{
    background:var(--bg);color:var(--text);border:1px solid var(--border);
    font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:600;
    letter-spacing:0.06em;text-transform:uppercase;padding:5px 11px;
    border-radius:4px;cursor:pointer;white-space:nowrap;
  }
  #manage-btn:hover{background:#21262d;border-color:var(--accent);}
  #manage-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}

  #manage-panel{
    position:absolute;top:48px;right:8px;z-index:1001;
    background:rgba(13,17,23,0.97);border:1px solid var(--border);
    border-radius:6px;padding:11px 13px;min-width:200px;max-height:70vh;
    overflow-y:auto;display:none;backdrop-filter:blur(8px);
  }
  #manage-panel h3{
    font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:700;
    letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);
    margin-bottom:8px;
  }
  .state-row{
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;padding:5px 0;font-size:0.82rem;color:var(--text);
    border-bottom:1px solid var(--border);
  }
  .state-row:last-child{border-bottom:none;}
  .state-name{font-weight:600;letter-spacing:0.04em;}
  .state-status{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
  .state-toggle{
    width:38px;height:20px;border-radius:10px;background:var(--border);
    position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;
  }
  .state-toggle.on{background:var(--accent);}
  .state-toggle::after{
    content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;
    border-radius:50%;background:#fff;transition:left 0.2s;
  }
  .state-toggle.on::after{left:20px;}
  .state-toggle.disabled{opacity:0.35;cursor:not-allowed;}
  .state-row{cursor:pointer;}
  .state-row:hover .state-name{color:var(--accent);}

  @media(max-width:500px){
    #legend{bottom:38px;right:5px;}
    #info-panel{left:5px;right:5px;max-width:none;bottom:38px;}
    #manage-panel{right:5px;left:5px;min-width:auto;}
  }
</style>
</head>
<body>
<div id="loadbar"></div>
<div id="header">
  <h1>PUBLIC <span>LAND MAP</span></h1>
  <span class="build-tag">Build #32</span>
  <div id="controls">
    <button class="btn active" id="btn-topo"      onclick="setBase('topo')">Topo</button>
    <button class="btn"        id="btn-satellite"  onclick="setBase('satellite')">Satellite</button>
    <button class="btn"        id="btn-street"     onclick="setBase('street')">Street</button>
    <button class="btn active" id="btn-layer"      onclick="toggleLayer()">Ownership</button>
    <button class="btn locate" id="locate-btn"     onclick="locateMe()">📍 My Location</button>
    <div id="opacity-wrap">
      Opacity
      <input type="range" id="opacity-slider" min="10" max="95" value="70" oninput="updateOpacity(this.value)">
    </div>
    <button class="btn" id="manage-btn" onclick="toggleManagePanel()">States</button>
  </div>
</div>
<div id="map"></div>
<div id="statusbar">Zoom <b id="zoom-val">4</b> — zoom in or tap a state to load ownership data</div>
<div id="manage-panel">
  <h3>Manage States</h3>
  <div id="state-list"></div>
</div>
<div id="legend">
  <div id="legend-toggle" onclick="toggleLegend()">Legend <span id="legend-arrow">▲</span></div>
  <div id="legend-body">
    <div class="legend-row"><div class="legend-swatch" style="background:#F0B000"></div>BLM</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#267300"></div>National Forest (USFS)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#6699CD"></div>National Park / NPS</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#FF7F7F"></div>State Land / Trust</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#70A800"></div>Wildlife Refuge (FWS)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#C500FF"></div>Tribal Land</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#FF0000"></div>Military (DOD)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#004DA8"></div>Bureau of Reclamation</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#FFBEE8"></div>Other Federal</div>
  </div>
</div>
<div id="info-panel">
  <span id="info-close" onclick="closeInfo()">✕</span>
  <h3 id="info-title">Land Info</h3>
  <p id="info-body"></p>
</div>
<script>
// ══════════════════════════════════════════
// AGENCY COLORS & LABELS
// ══════════════════════════════════════════
const COLORS={
  'BLM':'#F0B000','USFS':'#267300','NPS':'#6699CD','FWS':'#70A800',
  'DOD':'#FF0000','BOR':'#004DA8','TRIB':'#C500FF',
  'STA':'#FF7F7F','STAT':'#FF7F7F','LOC':'#FFAA00','OTHF':'#FFBEE8'
};
const LABELS={
  'BLM':'Bureau of Land Management','USFS':'US Forest Service',
  'NPS':'National Park Service','FWS':'US Fish & Wildlife Service',
  'DOD':'Dept. of Defense (Military)','BOR':'Bureau of Reclamation',
  'TRIB':'Tribal Land','STA':'State Land / Trust',
  'LOC':'Local Government','OTHF':'Other Federal'
};
function agencyColor(c){return COLORS[(c||'').toUpperCase()]||'#FFBEE8';}

// ══════════════════════════════════════════
// AVAILABLE STATES
// Add new state abbreviations here as you
// upload more padus_XX.geojson files
// ══════════════════════════════════════════
// ══════════════════════════════════════════
// KNOWN GAP (Build #32 audit): State Land/Trust (STA) and
// Local Government (LOC) parcels are NOT included in the
// current padus_XX.geojson files. Original PAD-US data
// filtered to Mang_Type in [FED,TRIB,JNT] only.
// To add state trust lands, original .gdb files need to be
// reprocessed including Mang_Type == 'STAT' or 'LOC' records
// where Mang_Name indicates state land board/trust.
// ══════════════════════════════════════════
const AVAILABLE_STATES = ['AR','AZ','CA','CO','IA','ID','KS','LA','MI','MN','MO','MT','ND','NE','NM','NV','OK','OR','SD','TX','UT','WA','WI','WY'];

// Full names for display in manage panel
const STATE_NAMES = {
  'AL':'Alabama','AK':'Alaska','AZ':'Arizona','AR':'Arkansas','CA':'California',
  'CO':'Colorado','CT':'Connecticut','DE':'Delaware','FL':'Florida','GA':'Georgia',
  'HI':'Hawaii','ID':'Idaho','IL':'Illinois','IN':'Indiana','IA':'Iowa',
  'KS':'Kansas','KY':'Kentucky','LA':'Louisiana','ME':'Maine','MD':'Maryland',
  'MA':'Massachusetts','MI':'Michigan','MN':'Minnesota','MS':'Mississippi','MO':'Missouri',
  'MT':'Montana','NE':'Nebraska','NV':'Nevada','NH':'New Hampshire','NJ':'New Jersey',
  'NM':'New Mexico','NY':'New York','NC':'North Carolina','ND':'North Dakota','OH':'Ohio',
  'OK':'Oklahoma','OR':'Oregon','PA':'Pennsylvania','RI':'Rhode Island','SC':'South Carolina',
  'SD':'South Dakota','TN':'Tennessee','TX':'Texas','UT':'Utah','VT':'Vermont',
  'VA':'Virginia','WA':'Washington','WV':'West Virginia','WI':'Wisconsin','WY':'Wyoming'
};

// Per-state visibility toggle (user can hide states even if data is loaded)
const stateHidden = {};

// State bounding boxes [west, south, east, north]
const STATE_BBOX = {
  'AL':[-88.47,30.22,-84.89,35.01],'AK':[-179.15,51.21,-129.99,71.35],
  'AZ':[-114.82,31.33,-109.04,37.00],'AR':[-94.62,33.00,-89.64,36.50],
  'CA':[-124.41,32.53,-114.13,42.01],'CO':[-109.06,36.99,-102.04,41.00],
  'CT':[-73.73,40.99,-71.79,42.05],'DE':[-75.79,38.45,-75.05,39.84],
  'FL':[-87.63,24.52,-80.03,31.00],'GA':[-85.61,30.36,-80.84,35.00],
  'HI':[-160.25,18.91,-154.81,22.24],'ID':[-117.24,41.99,-111.04,49.00],
  'IL':[-91.51,36.97,-87.02,42.51],'IN':[-88.10,37.77,-84.78,41.76],
  'IA':[-96.64,40.38,-90.14,43.50],'KS':[-102.05,36.99,-94.59,40.00],
  'KY':[-89.57,36.50,-81.96,39.15],'LA':[-94.04,28.93,-88.82,33.02],
  'ME':[-71.08,43.06,-66.95,47.46],'MD':[-79.49,37.91,-75.05,39.72],
  'MA':[-73.51,41.24,-69.93,42.89],'MI':[-90.42,41.70,-82.41,48.19],
  'MN':[-97.24,43.50,-89.49,49.38],'MS':[-91.65,30.17,-88.10,35.01],
  'MO':[-95.77,35.99,-89.10,40.61],'MT':[-116.05,44.36,-104.04,49.00],
  'NE':[-104.05,40.00,-95.31,43.00],'NV':[-120.00,35.00,-114.04,42.00],
  'NH':[-72.56,42.70,-70.70,45.31],'NJ':[-75.56,38.93,-73.89,41.36],
  'NM':[-109.05,31.33,-103.00,37.00],'NY':[-79.76,40.50,-71.86,45.01],
  'NC':[-84.32,33.84,-75.46,36.59],'ND':[-104.05,45.94,-96.55,49.00],
  'OH':[-84.82,38.40,-80.52,41.98],'OK':[-103.00,33.62,-94.43,37.00],
  'OR':[-124.57,41.99,-116.46,46.24],'PA':[-80.52,39.72,-74.69,42.27],
  'RI':[-71.86,41.31,-71.12,42.02],'SC':[-83.35,32.05,-78.54,35.22],
  'SD':[-104.06,42.48,-96.44,45.95],'TN':[-90.31,34.98,-81.65,36.68],
  'TX':[-106.65,25.84,-93.51,36.50],'UT':[-114.05,37.00,-109.04,42.00],
  'VT':[-73.44,42.73,-71.50,45.02],'VA':[-83.68,36.54,-75.24,39.47],
  'WA':[-124.74,45.54,-116.92,49.00],'WV':[-82.64,37.20,-77.72,40.64],
  'WI':[-92.89,42.49,-86.25,47.08],'WY':[-111.06,40.99,-104.05,45.01]
};

// ══════════════════════════════════════════
// BASE LAYERS
// ══════════════════════════════════════════
const topoLayer     =L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',{attribution:'USGS Topo',maxZoom:16,zIndex:1});
const satelliteLayer=L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryTopo/MapServer/tile/{z}/{y}/{x}',{attribution:'USGS Imagery',maxZoom:16,zIndex:1});
const streetLayer   =L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19,zIndex:1});

const map=L.map('map',{center:[39.5,-98.35],zoom:4,layers:[topoLayer]});

// ── Bold state boundary overlay ──
// Loads US state outlines from GitHub and draws bold white+dark lines
// Retry up to 2 times since this is an external dependency
async function loadStateBorders(attempt=1){
  try{
    const resp = await fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json');
    if(!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    // Draw thick white outline first (background)
    L.geoJSON(data, {
      style: { color:'#ffffff', weight:4, fill:false, opacity:1.0 },
      zIndex: 20
    }).addTo(map);
    // Draw dark line on top
    L.geoJSON(data, {
      style: { color:'#1a1a2e', weight:2, fill:false, opacity:1.0 },
      zIndex: 21
    }).addTo(map);
  } catch(err){
    console.warn('State border load failed (attempt '+attempt+'):', err);
    if(attempt < 2) setTimeout(()=>loadStateBorders(attempt+1), 2000);
    // Silent failure after retries - base map still has faint state lines from USGS topo
  }
}
loadStateBorders();
let currentBase=topoLayer, currentOpacity=0.70, layerVisible=true;

// ══════════════════════════════════════════
// PER-STATE LOADING SYSTEM
// ══════════════════════════════════════════
const stateCache = {};       // state abbr -> GeoJSON features
const stateLayers = {};      // state abbr -> Leaflet geoJSON layer
let loadTimer = null;

function getVisibleStates(){
  const b = map.getBounds();
  return AVAILABLE_STATES.filter(abbr => {
    const bb = STATE_BBOX[abbr];
    if(!bb) return false;
    return b.getWest()<bb[2] && b.getEast()>bb[0] &&
           b.getSouth()<bb[3] && b.getNorth()>bb[1];
  });
}

function featureStyle(f){
  const agency=(f.properties.agency||'OTHF').toUpperCase();
  const color=agencyColor(agency);
  return{fillColor:color,fillOpacity:currentOpacity,color:color,weight:1.2,opacity:1.0};
}

async function loadState(abbr){
  if(stateCache[abbr]) return; // already loaded
  try{
    const resp = await fetch(`./padus_${abbr}.geojson`);
    if(!resp.ok) throw new Error(resp.status);
    const geojson = await resp.json();
    stateCache[abbr] = geojson.features || [];

    stateLayers[abbr] = L.geoJSON(geojson, {
      style: featureStyle,
      onEachFeature: function(f, layer){
        layer.on('click', function(e){
          L.DomEvent.stopPropagation(e);
          lastFeatureClickTime = Date.now();
          const p = f.properties;
          const agency = (p.agency||'OTHF').toUpperCase();
          const label = LABELS[agency]||agency;
          const name = p.name||label;
          const acres = p.acres ? p.acres.toLocaleString()+' acres' : '';
          const state = p.state||'';
          showInfo(name,
            `<span style="color:#aaa">${label}</span><br>`+
            `${state?'State: '+state+'<br>':''}`+
            `${acres?acres+'<br>':''}`+
            `<span style="color:var(--muted);font-size:0.72rem">${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}</span>`,
            agencyColor(agency)
          );
        });
      }
    });

    if(layerVisible && !stateHidden[abbr]){
      stateLayers[abbr].addTo(map);
    }

    rebuildStatePanel();
  } catch(err){
    console.warn(`Could not load padus_${abbr}.geojson:`, err);
  }
}

async function loadVisibleStates(){
  if(!layerVisible) return;
  const zoom = map.getZoom();

  // Don't auto-load until zoomed in enough
  if(zoom < 6){
    setStatus('Zoom <b id="zoom-val">'+zoom+'</b> — zoom in to load ownership data');
    return;
  }

  const visible = getVisibleStates();
  if(visible.length === 0){
    setStatus('Zoom <b id="zoom-val">'+zoom+'</b> — pan to a covered state to load data');
    return;
  }

  // Load any not yet loaded
  const toLoad = visible.filter(s => !stateCache[s]);
  if(toLoad.length > 0){
    setLoadBar(20);
    setStatus('Zoom <b id="zoom-val">'+map.getZoom()+'</b> — Loading '+toLoad.join(', ')+'…');
    await Promise.all(toLoad.map(s => loadState(s)));
    setLoadBar(100);
    setTimeout(()=>setLoadBar(0), 400);
  }

  const loaded = visible.filter(s => stateCache[s]);
  if(loaded.length > 0){
    setStatus('Zoom <b id="zoom-val">'+map.getZoom()+'</b> · '+loaded.join(', ')+' — tap any area for details');
  } else {
    setStatus('Zoom <b id="zoom-val">'+map.getZoom()+'</b> — no data for this area yet');
  }
}

// Zoom display only - no auto loading
map.on('zoomend', function(){
  const el = document.getElementById('zoom-val');
  if(el) el.textContent = map.getZoom();
});
map.on('moveend', function(){
  const el = document.getElementById('zoom-val');
  if(el) el.textContent = map.getZoom();
});

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
function setBase(type){
  map.removeLayer(currentBase);
  ['btn-topo','btn-satellite','btn-street'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(type==='topo'){currentBase=topoLayer;document.getElementById('btn-topo').classList.add('active');}
  else if(type==='satellite'){currentBase=satelliteLayer;document.getElementById('btn-satellite').classList.add('active');}
  else{currentBase=streetLayer;document.getElementById('btn-street').classList.add('active');}
  currentBase.addTo(map);
  currentBase.bringToBack();
  Object.values(stateLayers).forEach(l=>l.bringToFront());
}

function toggleLayer(){
  const btn=document.getElementById('btn-layer');
  if(layerVisible){
    Object.values(stateLayers).forEach(l=>map.removeLayer(l));
    btn.classList.remove('active');
    layerVisible=false;
    setStatus('Ownership layer hidden');
  }else{
    Object.entries(stateLayers).forEach(([abbr,l])=>{
      if(stateCache[abbr] && !stateHidden[abbr]) l.addTo(map);
    });
    btn.classList.add('active');
    layerVisible=true;
  }
}

function updateOpacity(val){
  currentOpacity=val/100;
  Object.values(stateLayers).forEach(l=>l.setStyle({fillOpacity:currentOpacity}));
}

// ══════════════════════════════════════════
// MY LOCATION
// ══════════════════════════════════════════
let locationMarker=null, locationCircle=null;
function locateMe(){
  const btn=document.getElementById('locate-btn');
  btn.textContent='⏳ Locating…';btn.disabled=true;
  map.locate({setView:true,maxZoom:13});
}
map.on('locationfound',function(e){
  const btn=document.getElementById('locate-btn');
  btn.textContent='📍 My Location';btn.disabled=false;
  if(locationMarker){map.removeLayer(locationMarker);map.removeLayer(locationCircle);}
  locationCircle=L.circle(e.latlng,{radius:e.accuracy,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.15,weight:1}).addTo(map);
  locationMarker=L.circleMarker(e.latlng,{radius:10,color:'#fff',weight:2.5,fillColor:'#3b82f6',fillOpacity:1}).addTo(map);
  locationMarker.bindPopup('<b>You are here</b>Tap any colored area to see ownership').openPopup();
  Object.values(stateLayers).forEach(l=>l.bringToFront());
});
map.on('locationerror',function(){
  const btn=document.getElementById('locate-btn');
  btn.textContent='📍 My Location';btn.disabled=false;
  alert('Location access denied. Please enable location in your browser/phone settings.');
});

// ══════════════════════════════════════════
// MAP CLICK — identify
// ══════════════════════════════════════════
let lastFeatureClickTime = 0;
map.on('click',function(e){
  // Defense-in-depth: if a feature was just clicked (stopPropagation should
  // have prevented this, but some browsers/Leaflet versions are inconsistent)
  if(Date.now() - lastFeatureClickTime < 100) return;
  showInfo('Private / Unclassified',
    `No public land record at this point.<br>`+
    `<span style="color:var(--muted);font-size:0.72rem">${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}</span>`,
    '#888');
});

// ══════════════════════════════════════════
// MANAGE STATES PANEL
// ══════════════════════════════════════════
let managePanelOpen = false;

function toggleManagePanel(){
  managePanelOpen = !managePanelOpen;
  const panel = document.getElementById('manage-panel');
  const btn = document.getElementById('manage-btn');
  panel.style.display = managePanelOpen ? 'block' : 'none';
  btn.classList.toggle('active', managePanelOpen);
  if(managePanelOpen) rebuildStatePanel();
}

function rebuildStatePanel(){
  const list = document.getElementById('state-list');
  if(!list) return;
  list.innerHTML = '';

  // Sort: loaded states first, then alphabetically
  // Sort: loaded first, then available alphabetically
  const sorted = [...AVAILABLE_STATES].sort((a,b)=>{
    const aLoaded = !!stateCache[a], bLoaded = !!stateCache[b];
    if(aLoaded !== bLoaded) return aLoaded ? -1 : 1;
    return (STATE_NAMES[a]||a).localeCompare(STATE_NAMES[b]||b);
  });

  sorted.forEach(abbr=>{
    const loaded = !!stateCache[abbr];
    const hidden = !!stateHidden[abbr];
    const row = document.createElement('div');
    row.className = 'state-row';

    const nameDiv = document.createElement('div');
    const statusText = loaded ? (hidden ? 'Hidden' : 'Loaded') : 'Tap to load';
    nameDiv.innerHTML = `<span class="state-name">${STATE_NAMES[abbr]||abbr}</span><br>` +
      `<span class="state-status" style="color:${loaded && !hidden ? '#70A800' : loaded && hidden ? '#f0a500' : 'var(--accent)'}">${statusText}</span>`;

    const toggle = document.createElement('div');
    toggle.className = 'state-toggle' + (loaded && !hidden ? ' on' : '');
    toggle.title = loaded ? 'Toggle visibility' : 'Load '+STATE_NAMES[abbr];
    toggle.onclick = () => {
      if(loaded){
        toggleStateVisibility(abbr);
      } else {
        // Load the state and fly to it
        loadAndFlyTo(abbr);
      }
    };

    row.appendChild(nameDiv);
    row.appendChild(toggle);
    list.appendChild(row);
  });
}

async function loadAndFlyTo(abbr){
  setStatus('Loading '+( STATE_NAMES[abbr]||abbr)+'…');
  await loadState(abbr);
  // Fly to the state
  const bb = STATE_BBOX[abbr];
  if(bb) map.fitBounds([[bb[1],bb[0]],[bb[3],bb[2]]], {padding:[30,30]});
  rebuildStatePanel();
}

function toggleStateVisibility(abbr){
  if(!stateCache[abbr]) return;
  stateHidden[abbr] = !stateHidden[abbr];

  if(stateHidden[abbr]){
    if(stateLayers[abbr]) map.removeLayer(stateLayers[abbr]);
  } else {
    if(stateLayers[abbr] && layerVisible) stateLayers[abbr].addTo(map);
  }
  rebuildStatePanel();
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function showInfo(title,body,borderColor){
  const p=document.getElementById('info-panel');
  document.getElementById('info-title').textContent=title;
  document.getElementById('info-body').innerHTML=body;
  p.style.borderColor=borderColor||'var(--accent)';
  p.style.display='block';
}
function closeInfo(){document.getElementById('info-panel').style.display='none';}
function setLoadBar(pct){document.getElementById('loadbar').style.width=pct+'%';}
function setStatus(html){document.getElementById('statusbar').innerHTML=html;}
let legendOpen=true;
function toggleLegend(){
  legendOpen=!legendOpen;
  document.getElementById('legend-body').style.display=legendOpen?'flex':'none';
  document.getElementById('legend-arrow').textContent=legendOpen?'▲':'▼';
}
</script>
