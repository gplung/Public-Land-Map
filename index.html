<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Public Land Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap');
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#f0a500;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Barlow',sans-serif;
    background:var(--bg); color:var(--text);
    height:100dvh; display:flex; flex-direction:column; overflow:hidden;
  }
  #header {
    background:var(--panel); border-bottom:2px solid var(--accent);
    padding:8px 12px; display:flex; align-items:center; gap:8px;
    z-index:1000; flex-shrink:0; flex-wrap:wrap;
  }
  #header h1 {
    font-family:'Barlow Condensed',sans-serif; font-size:1.15rem;
    font-weight:700; letter-spacing:0.06em; color:var(--accent);
    text-transform:uppercase; white-space:nowrap; margin-right:2px;
  }
  #header h1 span { color:var(--text); }
  .build-tag {
    font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
    color:var(--muted); letter-spacing:0.08em; text-transform:uppercase;
    white-space:nowrap; margin-right:4px;
  }
  #controls { display:flex; align-items:center; gap:6px; flex-wrap:wrap; flex:1; }
  .btn {
    font-family:'Barlow Condensed',sans-serif; font-size:0.78rem;
    font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
    padding:5px 11px; border-radius:4px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); cursor:pointer;
    transition:background 0.15s,border-color 0.15s; white-space:nowrap;
  }
  .btn:hover    { background:#21262d; border-color:var(--accent); }
  .btn.active   { background:var(--accent); color:#000; border-color:var(--accent); }
  .btn.locate   { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
  .btn.locate:hover { background:#1e40af; }
  #opacity-wrap {
    display:flex; align-items:center; gap:5px; font-size:0.72rem;
    color:var(--muted); font-family:'Barlow Condensed',sans-serif;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  input[type=range] { width:70px; accent-color:var(--accent); cursor:pointer; }
  #map { flex:1; width:100%; }

  /* loading bar */
  #loadbar {
    position:absolute; top:0; left:0; width:0%; height:3px;
    background:var(--accent); z-index:2000;
    transition:width 0.3s ease;
  }

  /* status pill */
  #status {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:1500; background:rgba(13,17,23,0.92);
    border:1px solid var(--accent); border-radius:20px;
    padding:5px 14px; font-family:'Barlow Condensed',sans-serif;
    font-size:0.75rem; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--accent); display:none; backdrop-filter:blur(6px);
  }

  #legend {
    position:absolute; bottom:28px; right:8px; z-index:999;
    background:rgba(13,17,23,0.93); border:1px solid var(--border);
    border-radius:6px; padding:9px 11px; min-width:195px;
    backdrop-filter:blur(8px);
  }
  #legend-toggle {
    font-family:'Barlow Condensed',sans-serif; font-size:0.72rem;
    font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--accent); cursor:pointer; display:flex;
    align-items:center; justify-content:space-between; user-select:none;
  }
  #legend-body { margin-top:7px; display:flex; flex-direction:column; gap:4px; }
  .legend-row  { display:flex; align-items:center; gap:7px; font-size:0.76rem; color:var(--text); }
  .legend-swatch {
    width:18px; height:14px; border-radius:2px; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.2);
  }

  #info-panel {
    position:absolute; bottom:28px; left:8px; z-index:999;
    background:rgba(13,17,23,0.96); border:1px solid var(--accent);
    border-radius:6px; padding:11px 13px; max-width:255px;
    display:none; backdrop-filter:blur(8px);
  }
  #info-panel h3 {
    font-family:'Barlow Condensed',sans-serif; font-size:0.88rem;
    font-weight:700; letter-spacing:0.07em; text-transform:uppercase;
    color:var(--accent); margin-bottom:5px; padding-right:16px;
  }
  #info-panel p { font-size:0.79rem; color:var(--text); line-height:1.55; }
  #info-close {
    position:absolute; top:7px; right:9px;
    cursor:pointer; color:var(--muted); font-size:0.95rem;
  }
  #info-close:hover { color:var(--text); }

  .leaflet-control-attribution {
    background:rgba(13,17,23,0.7)!important;
    color:var(--muted)!important; font-size:0.6rem!important;
  }
  .leaflet-control-attribution a { color:var(--muted)!important; }
  @media(max-width:500px){
    #legend{bottom:16px;right:5px;}
    #info-panel{left:5px;right:5px;max-width:none;bottom:16px;}
  }
</style>
</head>
<body>

<div id="loadbar"></div>
<div id="status"></div>

<div id="header">
  <h1>PUBLIC <span>LAND MAP</span></h1>
  <span class="build-tag">Build #5</span>
  <div id="controls">
    <button class="btn active" id="btn-topo"      onclick="setBase('topo')">Topo</button>
    <button class="btn"        id="btn-satellite"  onclick="setBase('satellite')">Satellite</button>
    <button class="btn"        id="btn-street"     onclick="setBase('street')">Street</button>
    <button class="btn active" id="btn-layer"      onclick="toggleLayer()">Ownership</button>
    <button class="btn locate" id="locate-btn"     onclick="locateMe()">📍 My Location</button>
    <div id="opacity-wrap">
      Opacity
      <input type="range" id="opacity-slider" min="10" max="95" value="65"
             oninput="updateOpacity(this.value)">
    </div>
  </div>
</div>

<div id="map"></div>

<div id="legend">
  <div id="legend-toggle" onclick="toggleLegend()">
    Legend <span id="legend-arrow">▲</span>
  </div>
  <div id="legend-body">
    <div class="legend-row"><div class="legend-swatch" style="background:#F5C518"></div>BLM</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#1a8c1a"></div>National Forest (USFS)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#00aadd"></div>National Park (NPS)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#dd4400"></div>State Land / Trust</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#66dd00"></div>Wildlife Refuge (FWS)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#aa22ee"></div>Tribal Land</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#dd1111"></div>Military (DOD)</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#3377aa"></div>Bureau of Reclamation</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#778899"></div>Other Federal</div>
  </div>
</div>

<div id="info-panel">
  <span id="info-close" onclick="closeInfo()">✕</span>
  <h3 id="info-title">Land Info</h3>
  <p id="info-body"></p>
</div>

<script>
// ══════════════════════════════════════════
// AGENCY COLOR + LABEL TABLES
// ══════════════════════════════════════════
const COLORS = {
  'BLM':  '#F5C518',
  'USFS': '#1a8c1a',
  'NPS':  '#00aadd',
  'FWS':  '#66dd00',
  'DOD':  '#dd1111',
  'BOR':  '#3377aa',
  'TRIB': '#aa22ee',
  'STA':  '#dd4400',
  'STAT': '#dd4400',
  'LOC':  '#ff8800',
  'NGO':  '#ff66aa',
  'OTHF': '#778899',
};
const LABELS = {
  'BLM':'Bureau of Land Management','USFS':'US Forest Service',
  'NPS':'National Park Service','FWS':'US Fish & Wildlife Service',
  'DOD':'Dept. of Defense (Military)','BOR':'Bureau of Reclamation',
  'TRIB':'Tribal Land','STA':'State Land / Trust','STAT':'State Land / Trust',
  'LOC':'Local Government','NGO':'Non-Governmental Org',
  'OTHF':'Other Federal','PVT':'Private Land'
};

function agencyColor(code) {
  return COLORS[(code||'').toUpperCase()] || '#778899';
}

// ══════════════════════════════════════════
// BASE LAYERS
// ══════════════════════════════════════════
const topoLayer = L.tileLayer(
  'https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',
  {attribution:'USGS Topo',maxZoom:16,zIndex:1});
const satelliteLayer = L.tileLayer(
  'https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/{z}/{y}/{x}',
  {attribution:'USGS Imagery',maxZoom:16,zIndex:1});
const streetLayer = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap',maxZoom:19,zIndex:1});

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
const map = L.map('map',{center:[39.5,-98.35],zoom:5,layers:[topoLayer]});
let currentBase = topoLayer;

// GeoJSON layer group — we draw our OWN filled polygons
const ownershipGroup = L.layerGroup().addTo(map);
let layerVisible = true;
let currentOpacity = 0.65;
let currentZoom = map.getZoom();
let loadTimer = null;

// ══════════════════════════════════════════
// FETCH + DRAW OWNERSHIP POLYGONS
// Uses BLM ArcGIS REST FeatureServer — returns
// real GeoJSON we style ourselves with solid fills
// ══════════════════════════════════════════
async function loadOwnership() {
  if (!layerVisible) return;

  const zoom = map.getZoom();
  // Only load at zoom 7+ to avoid fetching too much data
  if (zoom < 7) {
    ownershipGroup.clearLayers();
    showStatus('Zoom in to see land ownership boundaries');
    return;
  }

  hideStatus();
  setLoadBar(10);

  const bounds = map.getBounds();
  const xmin = bounds.getWest().toFixed(6);
  const ymin = bounds.getSouth().toFixed(6);
  const xmax = bounds.getEast().toFixed(6);
  const ymax = bounds.getNorth().toFixed(6);
  const bbox = `${xmin},${ymin},${xmax},${ymax}`;

  // Limit features per request to keep it fast
  const maxRec = zoom >= 10 ? 500 : 200;

  setLoadBar(30);

  try {
    const url =
      `https://gis.blm.gov/arcgis/rest/services/lands/BLM_Natl_SMA_and_Grazing_Districts/MapServer/1/query?` +
      `geometry=${bbox}&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects` +
      `&outFields=ADMIN_AGENCY_CODE,ADMIN_UNIT_NAME,MGMT_AGENCY_CODE,GIS_ACRES,STATE_GEOG` +
      `&returnGeometry=true&outSR=4326&resultRecordCount=${maxRec}&f=geojson`;

    const resp = await fetch(url);
    const geojson = await resp.json();

    setLoadBar(80);
    ownershipGroup.clearLayers();

    if (geojson.features && geojson.features.length > 0) {
      L.geoJSON(geojson, {
        style: function(feature) {
          const code = (
            feature.properties.ADMIN_AGENCY_CODE ||
            feature.properties.MGMT_AGENCY_CODE  || 'OTHF'
          ).toUpperCase();
          const color = agencyColor(code);
          return {
            fillColor:   color,
            fillOpacity: currentOpacity,
            color:       color,
            weight:      1.2,
            opacity:     0.9
          };
        },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            L.DomEvent.stopPropagation(e);
            const p     = feature.properties;
            const code  = (p.ADMIN_AGENCY_CODE || p.MGMT_AGENCY_CODE || 'OTHF').toUpperCase();
            const label = LABELS[code] || code;
            const name  = p.ADMIN_UNIT_NAME || '';
            const acres = p.GIS_ACRES ? Math.round(p.GIS_ACRES).toLocaleString() + ' acres' : '';
            const state = p.STATE_GEOG || '';
            const color = agencyColor(code);
            showInfo(label,
              `${name  ? `<span style="color:#ccc">${name}</span><br>` : ''}` +
              `${state ? `State: ${state}<br>` : ''}` +
              `${acres ? `${acres}<br>` : ''}` +
              `<span style="color:var(--muted);font-size:0.72rem">${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}</span>`,
              color
            );
          });
        }
      }).addTo(ownershipGroup);
    }
    setLoadBar(100);
    setTimeout(()=>setLoadBar(0), 500);

  } catch(err) {
    setLoadBar(0);
    showStatus('Could not load ownership data — check connection');
    setTimeout(hideStatus, 3000);
  }
}

// Debounce so we don't hammer the API on every pan pixel
function scheduleLoad() {
  clearTimeout(loadTimer);
  loadTimer = setTimeout(loadOwnership, 600);
}

map.on('moveend', scheduleLoad);
map.on('zoomend', scheduleLoad);

// Initial load
loadOwnership();

// ══════════════════════════════════════════
// BASE SWITCHER
// ══════════════════════════════════════════
function setBase(type) {
  map.removeLayer(currentBase);
  ['btn-topo','btn-satellite','btn-street'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  if (type==='topo')      { currentBase=topoLayer;      document.getElementById('btn-topo').classList.add('active'); }
  else if(type==='satellite'){ currentBase=satelliteLayer; document.getElementById('btn-satellite').classList.add('active'); }
  else                    { currentBase=streetLayer;    document.getElementById('btn-street').classList.add('active'); }
  currentBase.addTo(map);
  currentBase.bringToBack();
}

// ══════════════════════════════════════════
// TOGGLE OWNERSHIP
// ══════════════════════════════════════════
function toggleLayer() {
  const btn = document.getElementById('btn-layer');
  if (layerVisible) {
    ownershipGroup.clearLayers();
    btn.classList.remove('active');
    layerVisible = false;
  } else {
    layerVisible = true;
    btn.classList.add('active');
    loadOwnership();
  }
}

// ══════════════════════════════════════════
// OPACITY — directly updates drawn polygons
// ══════════════════════════════════════════
function updateOpacity(val) {
  currentOpacity = val / 100;
  ownershipGroup.eachLayer(function(layer) {
    if (layer.setStyle) layer.setStyle({ fillOpacity: currentOpacity });
    // handle layer groups inside
    if (layer.eachLayer) layer.eachLayer(function(sub) {
      if (sub.setStyle) sub.setStyle({ fillOpacity: currentOpacity });
    });
  });
}

// ══════════════════════════════════════════
// MY LOCATION
// ══════════════════════════════════════════
let locationMarker = null, locationCircle = null;

function locateMe() {
  const btn = document.getElementById('locate-btn');
  btn.textContent = '⏳ Locating…';
  btn.disabled = true;
  map.locate({setView:true, maxZoom:13});
}

map.on('locationfound', function(e) {
  const btn = document.getElementById('locate-btn');
  btn.textContent = '📍 My Location';
  btn.disabled = false;
  if (locationMarker) { map.removeLayer(locationMarker); map.removeLayer(locationCircle); }
  locationCircle = L.circle(e.latlng,{
    radius:e.accuracy, color:'#3b82f6', fillColor:'#3b82f6',
    fillOpacity:0.12, weight:1
  }).addTo(map);
  locationMarker = L.circleMarker(e.latlng,{
    radius:10, color:'#fff', weight:2.5,
    fillColor:'#3b82f6', fillOpacity:1
  }).addTo(map);
  locationMarker.bindPopup('<b>You are here</b>Tap a colored area to see ownership').openPopup();
});

map.on('locationerror', function() {
  const btn = document.getElementById('locate-btn');
  btn.textContent = '📍 My Location';
  btn.disabled = false;
  alert('Location access denied. Please enable location in your browser/phone settings.');
});

// ══════════════════════════════════════════
// MAP CLICK — fallback identify for areas
// not covered by drawn polygons
// ══════════════════════════════════════════
map.on('click', async function(e) {
  const {lat,lng} = e.latlng;
  // Only query if no polygon was clicked
  showInfo('Looking up…','Fetching ownership data…','#f0a500');
  try {
    const url =
      `https://gis.blm.gov/arcgis/rest/services/lands/BLM_Natl_SMA_and_Grazing_Districts/MapServer/1/query?` +
      `geometry=${lng},${lat}&geometryType=esriGeometryPoint&inSR=4326` +
      `&spatialRel=esriSpatialRelIntersects` +
      `&outFields=ADMIN_AGENCY_CODE,ADMIN_UNIT_NAME,MGMT_AGENCY_CODE,GIS_ACRES,STATE_GEOG` +
      `&returnGeometry=false&f=json`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.features && data.features.length > 0) {
      const f     = data.features[0].attributes;
      const code  = (f.ADMIN_AGENCY_CODE||f.MGMT_AGENCY_CODE||'OTHF').toUpperCase();
      const label = LABELS[code]||code;
      const name  = f.ADMIN_UNIT_NAME||'';
      const acres = f.GIS_ACRES ? Math.round(f.GIS_ACRES).toLocaleString()+' acres' : '';
      const state = f.STATE_GEOG||'';
      showInfo(label,
        `${name  ? `<span style="color:#ccc">${name}</span><br>` : ''}` +
        `${state ? `State: ${state}<br>` : ''}` +
        `${acres ? `${acres}<br>` : ''}` +
        `<span style="color:var(--muted);font-size:0.72rem">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`,
        agencyColor(code)
      );
      return;
    }
  } catch(err) {}
  showInfo('Private / Unclassified',
    `No public land record at this point.<br>` +
    `<span style="color:var(--muted);font-size:0.72rem">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`,
    '#778899'
  );
});

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function showInfo(title, body, borderColor) {
  const panel = document.getElementById('info-panel');
  document.getElementById('info-title').textContent = title;
  document.getElementById('info-body').innerHTML    = body;
  panel.style.borderColor = borderColor||'var(--accent)';
  panel.style.display = 'block';
}
function closeInfo() { document.getElementById('info-panel').style.display='none'; }

function setLoadBar(pct) {
  document.getElementById('loadbar').style.width = pct+'%';
}
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.style.display = 'block';
}
function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

let legendOpen = true;
function toggleLegend() {
  legendOpen = !legendOpen;
  document.getElementById('legend-body').style.display = legendOpen ? 'flex' : 'none';
  document.getElementById('legend-arrow').textContent  = legendOpen ? '▲' : '▼';
}
</script>
</body>
</html>
